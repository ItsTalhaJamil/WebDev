<!DOCTYPE html>
<html lang="en">
<head>
    <title>User Form</title>
    <link rel="stylesheet" href="MyPortfolio/css/style.css">
</head>
<body>

    <h2 style="text-align: center"><u>User <b>Information</b> Form</u></h2>

    <form id="userForm">
     <div class="container">      <div class="left Div" >
        <label>Name:</label>
        <input type="text" id="name" required>
        <br><br>

              <label>Father's Name:</label>
        <input type="text" id="fatherName" required>
        <br><br>

         <label>Contact NO:</label>
        <input type="text" id="contactNo" required>
        <br><br>
      </div>  

      <div  class="right Div">
          <label>Qualification:</label>
        <input type="text" id="qualification">
        <br><br>

        <label>Email:</label>
        <input type="email" id="email" required>
        <br><br>

        <label>Age:</label>
        <input type="number" id="age" required>
        <br><br>

      </div>

     </div> 
     
       
        <button type="submit" class="btn">Submit</button>
    </form>
    <div class="output">

    <h3 style="text-align: center;">Entered Data:</h3>

    <p id="outputName"></p>
    <p id="outputEmail"></p>
    <p id="outputAge"></p>
    <p id="outputFatherName"></p>
    <p id="outputContactNo"></p>
    <p id="outputQualification"></p>
</div>

    <script src="form.js"></script>

</body>
</html>
